<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하나 선물 ❤️</title>
    <meta name="description" content="하나가 보내는 선물 — 마이크에 후~ 불어주세요 🌷">
    <meta property="og:title" content="하나 선물 ❤️">
    <meta property="og:description" content="마이크에 '후~' 불면 카네이션이 피어나요 🌷">
    <meta property="og:image" content="https://hanabanana-vin.github.io/parents-day-card/frames/f080.jpg">
    <meta property="og:url" content="https://hanabanana-vin.github.io/parents-day-card/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="하나 선물 ❤️">
    <meta name="twitter:description" content="마이크에 '후~' 불면 카네이션이 피어나요 🌷">
    <meta name="twitter:image" content="https://hanabanana-vin.github.io/parents-day-card/frames/f080.jpg">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Diphylleia&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card-container">
        <!-- 꽃봉오리 / 꽃 영역 (이미지 시퀀스로 그리는 캔버스) -->
        <div class="flower-wrapper" id="flowerWrapper">
            <img id="flowerImg" class="bloom-img" src="frames/f001.jpg" alt="피어나는 카네이션">
            <div class="hint-overlay" id="hintOverlay"></div>
        </div>

        <!-- 안내 문구 (초기 표시) -->
        <div class="instruction-text" id="instructionText">
            <p>소리내어 <strong>'후~'</strong> 불어주세요 🌬️</p>
            <button id="startBtn" class="start-btn" disabled>준비중...</button>
        </div>

        <!-- 감사 문구 (영상 진행도에 따라 페이드인) -->
        <div class="message-text" id="messageText">
            <p data-fade-from="0.55" data-fade-to="0.95">감사합니다.<br>언제나 사랑합니다.</p>
            <button id="replayBtn" class="replay-btn" type="button">↺ 다시 해보기</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
