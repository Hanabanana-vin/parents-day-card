<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>어버이날 감사 카드</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Diphylleia&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="사랑하는 부모님을 위한 어버이날 감사 카드입니다.">
</head>
<body>
    <!-- 카카오톡 등 인앱 브라우저에서 열린 경우 안내 -->
    <div class="inapp-overlay" id="inappOverlay" hidden>
        <div class="inapp-card">
            <p class="inapp-title">🌷 외부 브라우저에서 열어주세요</p>
            <p class="inapp-desc">카카오톡 안에서는 영상이 잘 보이지 않아요.<br>아래 버튼을 눌러 기본 브라우저에서 열어주세요.</p>
            <button id="openExternalBtn" class="inapp-btn" type="button">기본 브라우저로 열기</button>
            <p class="inapp-hint" id="inappHint"></p>
        </div>
    </div>

    <div class="card-container">
        <!-- 꽃봉오리 / 꽃 영역 -->
        <div class="flower-wrapper" id="flowerWrapper">
            <video
                id="bloomVideo"
                class="bloom-video"
                muted
                playsinline
                webkit-playsinline
                preload="auto"
                disablepictureinpicture
                poster="poster.jpg"
                aria-label="피어나는 카네이션">
                <source src="flower_bloom.mp4" type="video/mp4">
            </video>
            <div class="hint-overlay" id="hintOverlay"></div>
        </div>

        <!-- 안내 문구 (초기 표시) -->
        <div class="instruction-text" id="instructionText">
            <p>소리내어 <strong>'후~'</strong> 불어주세요 🌬️</p>
            <button id="startBtn" class="start-btn">마이크 허용하고 시작하기</button>
        </div>

        <!-- 감사 문구 (영상 진행도에 따라 페이드인) -->
        <div class="message-text" id="messageText">
            <p data-fade-from="0.55" data-fade-to="0.95">감사합니다.<br>언제나 사랑합니다.</p>
            <button id="replayBtn" class="replay-btn" type="button">↺ 다시 해보기</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
